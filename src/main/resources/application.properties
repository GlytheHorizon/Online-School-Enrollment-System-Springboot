# Server Configuration
server.port=${PORT:8080}

# MySQL Database Configuration (supports Railway MySQL plugin env vars)
spring.datasource.url=${DB_URL:${MYSQL_URL:jdbc:mysql://localhost:3306/school_enrollment?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}}
spring.datasource.username=${DB_USERNAME:${MYSQL_USER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQL_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# Data initialization (auto-seeds courses on first run)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# File uploads
spring.servlet.multipart.enabled=false
